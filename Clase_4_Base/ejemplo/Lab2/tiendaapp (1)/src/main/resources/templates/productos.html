<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos | TiendaApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div th:replace="~{fragments/header :: navbar}"></div>

    <main class="container my-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="mb-1">Productos</h1>

                <p class="text-muted" th:if="${filtro}" th:text="${filtro}"></p>

                <p class="text-muted" th:unless="${filtro}">
                    Total:
                    <span class="badge bg-primary" th:text="${productos.size()}">0</span>
                </p>
            </div>

            <div>
                <a href="/productos" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-clockwise me-1"></i>
                    Ver todos
                </a>
            </div>
        </div>

        <div class="alert alert-success alert-dismissible fade show" th:if="${ok}">
            <span th:text="${ok}">Operación realizada</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="alert alert-warning" th:if="${productos.isEmpty()}">
            No hay productos para mostrar.
        </div>

        <a class="btn btn-primary mb-3" th:href="@{/productos/nuevo}">
            <i class="bi bi-plus-circle me-1"></i>
            Nuevo producto
        </a>

        <div class="row g-3">

            <div class="col-12 col-md-6 col-lg-4" th:each="p : ${productos}">

                <div class="card h-100 shadow-sm">

                    <div class="card-body d-flex flex-column">

                        <span class="badge bg-secondary mb-2" th:text="${p.categoria}"></span>

                        <h5 th:text="${p.nombre}"></h5>

                        <p class="text-muted small flex-grow-1" th:text="${p.descripcion}"></p>

                        <div class="d-flex justify-content-between">
                            <strong>$<span th:text="${#numbers.formatDecimal(p.precio,1,2)}"></span></strong>
                            <small><span th:text="${p.stock}"></span> unidades</small>
                        </div>

                        <div class="d-flex gap-2 mt-3">

                            <a class="btn btn-outline-primary btn-sm" th:href="@{/productos/{id}(id=${p.id})}">
                                Ver detalle
                            </a>

                            <a class="btn btn-outline-warning btn-sm" th:href="@{/productos/{id}/editar(id=${p.id})}">
                                Editar
                            </a>

                            <button class="btn btn-outline-danger btn-sm" data-bs-toggle="modal"
                                data-bs-target="#modalEliminar" th:data-id="${p.id}" th:data-nombre="${p.nombre}">
                                Eliminar
                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <div class="modal fade" id="modalEliminar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Eliminar producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    ¿Seguro que deseas eliminar:
                    <strong id="nombreProducto"></strong>?
                </div>

                <div class="modal-footer">
                    <form id="formEliminar" method="post">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-danger">
                            Eliminar
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const modalEliminar = document.getElementById('modalEliminar');

        if (modalEliminar) {
            modalEliminar.addEventListener('show.bs.modal', event => {
                const boton = event.relatedTarget;


                const idProducto = boton.getAttribute('data-id');
                const nombreProducto = boton.getAttribute('data-nombre');


                const textoNombre = modalEliminar.querySelector('#nombreProducto');
                textoNombre.textContent = nombreProducto;


                const formEliminar = modalEliminar.querySelector('#formEliminar');
                formEliminar.action = `/productos/${idProducto}/eliminar`;
            });
        }
    </script>

</body>

</html>
