<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Formulario de Producto</h2>

    <form th:action="@{/productos}"
          th:object="${producto}"
          method="post">

        
        <input type="hidden" th:field="*{id}">

        <!-- Nombre -->
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text"
                   class="form-control"
                   th:field="*{nombre}">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('nombre')}"
                 th:errors="*{nombre}"></div>
        </div>

        
        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control"
                      rows="3"
                      th:field="*{descripcion}"></textarea>
            <div class="text-danger"
                 th:if="${#fields.hasErrors('descripcion')}"
                 th:errors="*{descripcion}"></div>
        </div>

        
        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number"
                   step="0.01"
                   class="form-control"
                   th:field="*{precio}">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('precio')}"
                 th:errors="*{precio}"></div>
        </div>

        
        <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number"
                   class="form-control"
                   th:field="*{stock}">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('stock')}"
                 th:errors="*{stock}"></div>
        </div>

       
        <div class="mb-3">
            <label class="form-label">Categoría</label>
            <input type="text"
                   class="form-control"
                   th:field="*{categoria}">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('categoria')}"
                 th:errors="*{categoria}"></div>
        </div>

        <button type="submit" class="btn btn-success">
            Guardar Producto
        </button>

        <a th:href="@{/productos}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>
</html>
